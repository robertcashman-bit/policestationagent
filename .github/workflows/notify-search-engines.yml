# Notify Yandex and IndexNow after deploy for fast indexing.
# Google discovery is handled by Search Console sitemap submission.
# DuckDuckGo uses Bing (and other sources) — Bing + IndexNow improves DDG visibility.
name: Notify Search Engines

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  SITE_URL: "https://www.policestationagent.com"
  SITEMAP_URL: "https://www.policestationagent.com/sitemap.xml"
  NEXT_PUBLIC_SITE_URL: "https://www.policestationagent.com"

jobs:
  notify:
    name: Notify Search Engines
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Wait for Vercel deployment
        run: sleep 120

      - name: Notify sitemap and IndexNow
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
        run: node scripts/notify-search-engines.js

      - name: Call site IndexNow API
        env:
          INDEXNOW_SECRET: ${{ secrets.INDEXNOW_SECRET }}
        run: |
          echo "Calling site /api/index-now..."
          if [ -n "$INDEXNOW_SECRET" ]; then
            curl -s -X POST "${{ env.SITE_URL }}/api/index-now?secret=${INDEXNOW_SECRET}" || true
          else
            echo "Skipping protected API call because INDEXNOW_SECRET is not set in GitHub Secrets."
          fi
          echo "Done"

      - name: Summary
        run: |
          echo "✅ Search engine notifications complete!"
          echo "- policestationagent.com: IndexNow + Yandex (+ Bing if key set)"
          echo "- policestationrepuk.org: sitemap URLs + Yandex (+ Bing if key set)"
          echo "- Google: submit sitemaps in Search Console"
          echo "- DuckDuckGo: follows Bing index"
