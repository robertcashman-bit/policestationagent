name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compliance scan
        run: npm run compliance:scan

      - name: Legal accuracy audit
        run: npm run audit:legal

      - name: Blog image audit
        run: npm run audit:blog-images

      - name: Readability audit
        run: npm run audit:readability

      - name: Legal accuracy tests
        run: npm run test:legal

      - name: Unit tests
        run: npm test

      - name: Firm outreach repo verification
        run: npm run verify:firm-outreach

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: 'true'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          CI: 'true'

      - name: E2E firm outreach tests
        run: npm run test:e2e:firm-outreach
        env:
          CI: 'true'
