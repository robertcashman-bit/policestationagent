name: SEO police-number confusion audit

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seo-confusion-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Police confusion unit tests
        run: npx vitest run __tests__/police-confusion-score.test.ts

      - name: Police confusion health audit
        run: npm run seo:police-confusion

      - name: Full number-occurrence inventory
        run: npm run seo:police-number-inventory

      - name: Build (metadata + schema compile)
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-police-number-reports
          path: |
            reports/seo-police-number-audit.json
            reports/seo-police-number-audit.md
            data/police-confusion-reports/latest.json
          if-no-files-found: warn

      - name: Open or update regression issue
        if: failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push')
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- seo-police-number-regression -->';
            const title = 'SEO regression: police-number confusion audit failed';
            const body = `${marker}\nAutomated SEO police-number confusion audit failed on \`${context.sha}\`.\n\nWorkflow: ${context.workflow}\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nDo not auto-merge fixes. Review metadata, schema, redirects and CTAs before production deploy.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.data.find(i => (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Regression still failing on \`${context.sha}\`. ${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['seo', 'bug'],
              });
            }

      - name: Close regression issue when green
        if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'push')
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- seo-police-number-regression -->';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.data.find(i => (i.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Audit passed on \`${context.sha}\`. Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }
