name: Schedule Buffer Posts

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "seo-growth-police-station-agent/buffer/buffer-posts.json"
      - "scripts/schedule-buffer-posts.mjs"
      - "scripts/generate-buffer-calendar.mjs"

jobs:
  schedule:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify buffer calendar URLs
        run: node scripts/verify-buffer-posts.mjs

      - name: Schedule posts to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: node scripts/schedule-buffer-posts.mjs
