# SonarQube/SonarCloud Project Configuration
sonar.projectKey=policestationagent
sonar.projectName=Police Station Agent
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=app,components,lib
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/dist/**,**/legacy/**,**/scripts/**,**/e2e-tests/**,**/playwright-results/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Test exclusions (if you add tests later)
sonar.test.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/dist/**

# Language settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Code coverage (if available)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/.next/**

# File patterns
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx
